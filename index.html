<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Quality Control Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* ---------------- CARDS ---------------- */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

/* ---------------- BIG AQI ---------------- */
.aqi-box {
  text-align: center;
  margin: 20px 0;
}

.aqi-value {
  font-size: 60px;
  font-weight: bold;
}

/* ---------------- PROGRESS BAR ---------------- */
.bar {
  width: 100%;
  height: 25px;
  background: #1f2937;
  border-radius: 20px;
  overflow: hidden;
  margin-top: 10px;
}

.fill {
  height: 100%;
  width: 0%;
  transition: 0.5s;
}

/* COLORS */
.green { background: #22c55e; }
.yellow { background: #eab308; }
.orange { background: #f97316; }
.red { background: #ef4444; }
.magenta { background: #d946ef; }
.brown { background: #6b4f2a; }

.status {
  margin-top: 10px;
  font-size: 14px;
  color: #cbd5e1;
}

canvas {
  margin-top: 20px;
  background: #111827;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌍 Air Quality Industrial Monitor</h1>

<!-- AQI -->
<div class="aqi-box">
  <div id="aqi" class="aqi-value">--</div>
  <div class="status" id="status">Waiting...</div>

  <div class="bar">
    <div id="bar" class="fill green"></div>
  </div>
</div>

<!-- SENSOR GRID -->
<div class="grid">
  <div class="card">PM<br><span id="pm">--</span></div>
  <div class="card">CO<br><span id="co">--</span></div>
  <div class="card">SO2<br><span id="so2">--</span></div>
  <div class="card">NO2<br><span id="no2">--</span></div>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

</div>

<!-- ================= FOOTER ================= -->
<div style="
  margin-top: 30px;
  padding: 20px;
  text-align: center;
  background: #111827;
  border-radius: 12px;
  color: #94a3b8;
">

  <div style="font-size: 16px; margin-bottom: 8px;">
    ساخته شده توسط <b style="color:#38bdf8;">T_J Friends</b>
  </div>

  <div style="margin-bottom: 8px;">
    ارتباط: 
    <a href="mailto:tasgari105@gmail.com" style="color:#38bdf8; text-decoration:none;">
      tasgari105@gmail.com
    </a>
  </div>

  <div style="font-size: 12px; color:#64748b;">
    Air Quality Monitoring System • Real-time IoT Dashboard
  </div>

</div>

<script>

const API = "https://api-aqi.m-j-abg88.workers.dev";

let chart;

// ---------------- STATUS ENGINE ----------------
function getStatus(val) {

  if (val >= 3367) {
    return {
      color: "brown",
      text: "فوق اضطراری - آلودگی نامتعارف - اطلاع فوری به مراجع قضایی و مدیر کارخانه"
    };
  }
  else if (val >= 2694) {
    return {
      color: "magenta",
      text: "اضطراری - آلودگی خطرناک - اطلاع به مدیر و مراجع"
    };
  }
  else if (val >= 2021) {
    return {
      color: "red",
      text: "قرمز - آلودگی آسیب‌زا - نیاز به پیگیری فوری"
    };
  }
  else if (val >= 1348) {
    return {
      color: "orange",
      text: "هشدار - آلودگی قابل توجه"
    };
  }
  else if (val >= 675) {
    return {
      color: "yellow",
      text: "متوسط - وضعیت قابل قبول"
    };
  }
  else {
    return {
      color: "green",
      text: "سالم - وضعیت پایدار"
    };
  }
}

// ---------------- LIVE DATA ----------------
async function loadLatest() {

  const res = await fetch(API + "/latest");
  const d = await res.json();

  if (!d.nafas) return;

  document.getElementById("aqi").innerText = d.nafas;

  document.getElementById("pm").innerText = d.pmvalue;
  document.getElementById("co").innerText = d.covalue;
  document.getElementById("so2").innerText = d.so2value;
  document.getElementById("no2").innerText = d.NO2NH3value;

  const s = getStatus(d.nafas);

  document.getElementById("status").innerText = s.text;

  // progress bar
  const percent = Math.min((d.nafas / 4095) * 100, 100);

  const bar = document.getElementById("bar");
  bar.style.width = percent + "%";
  bar.className = "fill " + s.color;
}

// ---------------- CHART ----------------
async function loadChart() {

  const res = await fetch(API + "/history?limit=60");
  const data = await res.json();

  const labels = data.map(x =>
    new Date(x.created_at).toLocaleTimeString()
  );

  const values = data.map(x => x.nafas);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "AQI",
        data: values,
        borderWidth: 2,
        borderColor: "#38bdf8",
        tension: 0.3
      }]
    }
  });
}

// ---------------- AUTO UPDATE ----------------
loadLatest();
loadChart();

setInterval(loadLatest, 2000);
setInterval(loadChart, 5000);

</script>

</body>
</html>
